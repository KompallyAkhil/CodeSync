<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Sync</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --bg: #ffffff;
        --text: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --success: #10b981;
        --error: #ef4444;
        --surface: #f8fafc;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 380px;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      /* Header */
      header {
        padding: 20px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 18px;
        color: var(--text);
      }

      .brand-icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 16px;
      }

      .settings-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 8px;
        border-radius: 8px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .settings-btn:hover {
        background: var(--surface);
        color: var(--text);
      }

      /* Main Content */
      main {
        padding: 24px;
        min-height: 300px;
      }

      /* Views */
      .view {
        display: none;
        animation: fadeIn 0.3s ease;
      }

      .view.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Action View */
      .hero-section {
        text-align: center;
        margin-bottom: 24px;
      }

      .platform-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 16px;
      }

      .platform-status.active {
        background: #eff6ff;
        border-color: #bfdbfe;
        color: #1e40af;
      }

      .action-btn {
        width: 100%;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
      }

      .action-btn:active {
        transform: translateY(0);
      }

      .action-btn:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        opacity: 0.7;
      }

      /* Status Messages */
      .status-card {
        margin-top: 24px;
        padding: 16px;
        border-radius: 12px;
        font-size: 13px;
        display: none;
        line-height: 1.6;
      }

      .status-card.success {
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
        color: #065f46;
        display: block;
      }

      .status-card.error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        display: block;
      }

      .status-card.loading {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .status-link {
        display: inline-block;
        margin-top: 8px;
        color: inherit;
        font-weight: 600;
        text-decoration: underline;
      }

      /* Settings View */
      .settings-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .back-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        display: flex;
      }

      .back-btn:hover {
        color: var(--text);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-family: inherit;
        font-size: 14px;
        transition: all 0.2s;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .form-hint {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      .form-hint a {
        color: var(--primary);
        text-decoration: none;
      }

      .save-btn {
        width: 100%;
        padding: 14px;
        background: var(--text);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .save-btn:hover {
        background: #1e293b;
      }

      /* Spinner */
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(0, 0, 0, 0.1);
        border-left-color: currentColor;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="brand-icon">⚡</div>
        <span>CodeSync</span>
      </div>
      <button class="settings-btn" id="toggleSettings" title="Settings">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
          ></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </header>

    <main>
      <!-- Home View -->
      <div class="view active" id="homeView">
        <div class="hero-section">
          <div class="platform-status" id="platformBadge">
            <span id="platformIcon">🔍</span>
            <span id="platformName">Detecting...</span>
          </div>

          <button class="action-btn" id="extractBtn">
            <span>Extract & Save Solution</span>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
        </div>

        <div id="statusContainer"></div>
      </div>

      <!-- Settings View -->
      <div class="view" id="settingsView">
        <div class="settings-header">
          <button class="back-btn" id="backBtn">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </button>
          <h3>Configuration</h3>
        </div>

        <div class="form-group">
          <label class="form-label">Personal Access Token</label>
          <input
            type="password"
            id="githubToken"
            class="form-input"
            placeholder="ghp_xxxxxxxxxxxx"
          />
          <div class="form-hint">
            Generate token at
            <a href="https://github.com/settings/tokens" target="_blank"
              >github.com/settings/tokens</a
            >
            (Select 'repo' scope)
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">GitHub Username</label>
          <input
            type="text"
            id="githubUsername"
            class="form-input"
            placeholder="e.g. johndoe"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Repository Name</label>
          <input
            type="text"
            id="githubRepo"
            class="form-input"
            placeholder="e.g. leetcode-solutions"
          />
        </div>

        <button class="save-btn" id="saveConfig">Save Configuration</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
